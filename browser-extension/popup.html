<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>HOLLY AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">&#9670;</span>
          <span class="logo-text">HOLLY</span>
        </div>
        <span id="status-indicator" class="status-dot disconnected" title="Disconnected"></span>
      </div>
      <div class="header-right">
        <button id="settings-btn" class="icon-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <button id="clear-btn" class="icon-btn" title="Clear conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="settings-panel" class="hidden">
      <div class="settings-content">
        <h3>Settings</h3>
        <div class="setting-group">
          <label for="server-url">Server URL</label>
          <input type="url" id="server-url" placeholder="https://holly.nexamusicgroup.com">
        </div>
        <div class="setting-group">
          <label for="api-key">API Key</label>
          <input type="password" id="api-key" placeholder="Enter your HOLLY API key">
        </div>
        <div class="setting-group">
          <label class="checkbox-label">
            <input type="checkbox" id="stream-toggle" checked>
            <span>Enable streaming responses</span>
          </label>
        </div>
        <div class="settings-actions">
          <button id="save-settings" class="btn-primary">Save</button>
          <button id="test-connection" class="btn-secondary">Test Connection</button>
        </div>
        <div id="settings-status" class="settings-status"></div>
      </div>
    </div>

    <div id="messages">
      <div class="welcome-message">
        <div class="welcome-icon">&#9670;</div>
        <h2>HOLLY AI</h2>
        <p>Self-Evolving Intelligence</p>
      </div>
    </div>

    <div id="typing-indicator" class="hidden">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div id="input-area">
      <div class="input-wrapper">
        <textarea id="message-input" placeholder="Ask HOLLY anything..." rows="1"></textarea>
        <div class="input-actions">
          <button id="mic-btn" class="icon-btn" title="Voice input">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <button id="send-btn" class="send-btn" title="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-hint">Enter to send &middot; Shift+Enter for new line</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
