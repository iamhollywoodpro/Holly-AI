<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="orb" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6d28d9" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="50" cy="50" r="46" fill="url(#orb)" filter="url(#glow)">
    <animate attributeName="r" values="44;47;44" dur="1.2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.85;1;0.85" dur="1.2s" repeatCount="indefinite" />
  </circle>

  <polyline points="15,50 30,50 35,50 40,30 48,70 54,38 58,50 65,50 85,50"
    fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite" />
  </polyline>
</svg>
