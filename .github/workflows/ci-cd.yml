name: 🚀 HOLLY Deploy

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  build-check:
    name: 🔨 Build Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔨 Build check
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: ✅ Build passed — Coolify webhook handles deployment
        run: echo "✅ Build check passed. Coolify deploys automatically via GitHub webhook."
