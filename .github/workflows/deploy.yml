name: HOLLY CD

on:
  workflow_run:
    workflows: ["HOLLY CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${{ github.repository_owner }}/holly-ai" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_short }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.timestamp }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APP_NAME=HOLLY
            NEXT_PUBLIC_ENABLE_MUSIC_GENERATION=true
            NEXT_PUBLIC_ENABLE_LYRICS_AI=true
            NEXT_PUBLIC_ENABLE_VIDEO_GENERATION=true
            NEXT_PUBLIC_ENABLE_ARTIST_CREATION=true
            NEXT_PUBLIC_ENABLE_TRUE_STREAMING=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64

      - name: Trigger Coolify Webhook
        if: vars.COOLIFY_WEBHOOK_URL != ''
        run: |
          echo "Triggering Coolify deploy webhook..."
          # Coolify deploy webhooks require authentication.
          # Pass the API token as a Bearer header if COOLIFY_TOKEN secret is set,
          # otherwise fall back to including it as a query parameter.
          if [ -n "${{ secrets.COOLIFY_TOKEN }}" ]; then
            echo "Using Bearer token authentication"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              "${{ vars.COOLIFY_WEBHOOK_URL }}" || echo "000")
          else
            echo "Warning: COOLIFY_TOKEN secret not set — sending unauthenticated request"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
              "${{ vars.COOLIFY_WEBHOOK_URL }}" || echo "000")
          fi
          echo "Webhook response: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Coolify webhook triggered successfully"
          else
            echo "⚠️ Coolify webhook returned $HTTP_STATUS"
            echo "To fix: Add COOLIFY_TOKEN secret (Coolify → Profile → API Tokens)"
          fi

      - name: Smoke test
        if: vars.NEXT_PUBLIC_APP_URL != ''
        run: |
          echo "Waiting 120s for deployment to stabilize..."
          sleep 120
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/health" --max-time 10 || echo "000")
            echo "Attempt $i: /api/health returned HTTP $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Smoke test passed"
              exit 0
            fi
            sleep 15
          done
          echo "⚠️ Smoke test did not pass after 3 attempts — deployment may still be in progress"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **CI Result:** ${{ github.event.workflow_run.conclusion }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
