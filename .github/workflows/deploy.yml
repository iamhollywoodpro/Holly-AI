name: HOLLY CD

on:
  workflow_run:
    workflows: ["HOLLY CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: vars.REGISTRY_URL != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: ${{ vars.REGISTRY_URL != '' }}
          tags: |
            ${{ vars.REGISTRY_URL || 'holly-ai' }}:latest
            ${{ vars.REGISTRY_URL || 'holly-ai' }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APP_NAME=HOLLY
            NEXT_PUBLIC_ENABLE_MUSIC_GENERATION=true
            NEXT_PUBLIC_ENABLE_LYRICS_AI=true
            NEXT_PUBLIC_ENABLE_VIDEO_GENERATION=true
            NEXT_PUBLIC_ENABLE_ARTIST_CREATION=true
            NEXT_PUBLIC_ENABLE_TRUE_STREAMING=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify Webhook
        if: vars.COOLIFY_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ vars.COOLIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.sha }}"}' \
            --fail --silent --show-error

      - name: Smoke test
        if: vars.COOLIFY_WEBHOOK_URL != ''
        run: |
          echo "Waiting 60s for deployment to stabilize..."
          sleep 60
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/health" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Smoke test failed: /api/health returned $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Smoke test passed: /api/health returned 200"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CI Result:** ${{ github.event.workflow_run.conclusion }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
